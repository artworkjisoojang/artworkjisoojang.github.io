<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jisoo Jang VL Prototype</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#f2f2f2;
  color:black;
  font-family:Helvetica, Arial, sans-serif;
  overflow:hidden;
}

.page{
  width:92vw;
  height:92vh;
  margin:4vh auto;
  background:white;
  position:relative;
  overflow:hidden;
  padding:24px;
}

.intro{
  width:100%;
  height:620px;
  position:relative;
  overflow:hidden;
}

.word{
  position:absolute;
  font-size:86px;
  font-weight:900;
  letter-spacing:-0.13em;
  line-height:1.02;
  white-space:nowrap;
}

.word:nth-child(1){
  top:0px;
  animation:drift1 14s cubic-bezier(.83,0,.17,1) infinite;
}

.word:nth-child(2){
  top:90px;
  animation:drift2 18s cubic-bezier(.83,0,.17,1) infinite;
}

.word:nth-child(3){
  top:180px;
  animation:drift3 16s cubic-bezier(.83,0,.17,1) infinite;
}

.word:nth-child(4){
  top:270px;
  animation:drift4 20s cubic-bezier(.83,0,.17,1) infinite;
}

.word:nth-child(5){
  top:360px;
  animation:drift5 15s cubic-bezier(.83,0,.17,1) infinite;
}

.word:nth-child(6){
  top:450px;
  animation:drift6 19s cubic-bezier(.83,0,.17,1) infinite;
}

@keyframes drift1{
  0%{transform:translateX(80vw);}
  45%{transform:translateX(-2vw);}
  100%{transform:translateX(-125vw);}
}

@keyframes drift2{
  0%{transform:translateX(-110vw);}
  45%{transform:translateX(4vw);}
  100%{transform:translateX(115vw);}
}

@keyframes drift3{
  0%{transform:translateX(90vw);}
  45%{transform:translateX(45vw);}
  100%{transform:translateX(-120vw);}
}

@keyframes drift4{
  0%{transform:translateX(-120vw);}
  45%{transform:translateX(8vw);}
  100%{transform:translateX(120vw);}
}

@keyframes drift5{
  0%{transform:translateX(100vw);}
  45%{transform:translateX(18vw);}
  100%{transform:translateX(-130vw);}
}

@keyframes drift6{
  0%{transform:translateX(-130vw);}
  45%{transform:translateX(0vw);}
  100%{transform:translateX(130vw);}
}

.handle{
  position:absolute;
  right:24px;
  bottom:330px;
  font-size:18px;
  font-weight:400;
  letter-spacing:-0.03em;
}

textarea{
  position:absolute;
  left:24px;
  bottom:150px;
  width:65%;
  height:70px;
  border:none;
  outline:none;
  resize:none;
  background:transparent;
  font-size:32px;
  font-family:inherit;
  letter-spacing:0.04em;
}

#output{
  position:absolute;
  left:24px;
  bottom:40px;
  width:calc(100% - 48px);
  display:flex;
  flex-wrap:wrap;
  align-items:flex-end;
  gap:0px;
  row-gap:0px;
  line-height:0;
}

.letter{
  height:130px;
  width:auto;
  display:block;
  margin-bottom:-35px;
}
</style>
</head>

<body>

<div class="page">

  <div class="intro">
    <div class="word">VISUAL LANGUAGE IS CAPABLE OF DISSEMINATING KNOWLEDGE</div>
    <div class="word">MORE EFFECTIVELY THAN ALMOST ANY OTHER VEHICLE</div>
    <div class="word">OF COMMUNICATION</div>
    <div class="word">IT CAN BE LEARNED AND UNDERSTOOD</div>
    <div class="word">NOT ONLY BY EDUCATED PEOPLE</div>
    <div class="word">BUT ALSO BY THOSE WHO ARE UNABLE TO READ OR WRITE</div>
  </div>

  <div class="handle">@jisoojang</div>

  <textarea id="input" placeholder="TYPE HERE @OnlyEng"></textarea>

  <div id="output"></div>

</div>

<script>
const input = document.getElementById("input");
const output = document.getElementById("output");

input.addEventListener("input", () => {
  output.innerHTML = "";

  const text = input.value.toUpperCase();

  for(const char of text){
    if(char === " "){
      const space = document.createElement("div");
      space.style.width = "45px";
      output.appendChild(space);
      continue;
    }

    if(char >= "A" && char <= "Z"){
      const img = document.createElement("img");
      img.src = `letters/${char}.svg`;
      img.className = "letter";
      output.appendChild(img);
    }
  }
});
</script>

</body>
</html>
