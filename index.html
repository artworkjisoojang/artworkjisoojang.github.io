<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Jisoo Jang VL Prototype</title>

<style>
body {
  margin: 0;
  padding: 32px;
  background: white;
  color: black;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

.intro {
  width: 100%;
  height: 260px;
  position: relative;
  overflow: hidden;
  margin-bottom: 48px;
}

.word {
  position: absolute;
  font-size: 34px;
  line-height: 1;
  white-space: nowrap;
  animation: drift 12s linear infinite;
}

.word:nth-child(1) { top: 0px; left: 0%; animation-delay: 0s; }
.word:nth-child(2) { top: 42px; left: 14%; animation-delay: -2s; }
.word:nth-child(3) { top: 84px; left: 28%; animation-delay: -4s; }
.word:nth-child(4) { top: 126px; left: 7%; animation-delay: -6s; }
.word:nth-child(5) { top: 168px; left: 22%; animation-delay: -8s; }
.word:nth-child(6) { top: 210px; left: 4%; animation-delay: -10s; }

@keyframes drift {
  0% {
    transform: translateX(100vw);
  }
  100% {
    transform: translateX(-120vw);
  }
}

h1 {
  font-size: 24px;
  font-weight: 400;
  margin: 0 0 30px 0;
}

textarea {
  width: 100%;
  height: 120px;
  padding: 0;
  border: none;
  background: transparent;
  outline: none;
  resize: none;
  font-size: 48px;
  font-family: inherit;
}

#output {
  margin-top: 50px;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: flex-end;
}

.letter {
  height: 140px;
  width: auto;
  display: block;
}
</style>
</head>

<body>

<div class="intro">
  <div class="word">Visual language is capable of disseminating knowledge</div>
  <div class="word">more effectively than almost any other vehicle</div>
  <div class="word">of communication.</div>
  <div class="word">It can be learned and understood</div>
  <div class="word">not only by educated people</div>
  <div class="word">but also by those who are unable to read or write.</div>
</div>

<h1>Jisoo Jang VL Prototype</h1>

<textarea id="input" placeholder="A B C 입력해 보기"></textarea>

<div id="output"></div>

<script>
const input = document.getElementById("input");
const output = document.getElementById("output");

input.addEventListener("input", () => {
  output.innerHTML = "";

  const text = input.value.toUpperCase();

  for (const char of text) {
    if (char === " ") {
      const space = document.createElement("div");
      space.style.width = "60px";
      output.appendChild(space);
      continue;
    }

    if (char >= "A" && char <= "Z") {
      const img = document.createElement("img");
      img.src = `letters/${char}.svg`;
      img.className = "letter";
      img.alt = char;
      output.appendChild(img);
    }
  }
});
</script>

</body>
</html>
