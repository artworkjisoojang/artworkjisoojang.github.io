<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SVG Typeface Tester</title>

<style>
body {
  margin: 0;
  padding: 50px;
  background: white;
  color: black;
  font-family: Arial, sans-serif;
}

h1 {
  font-size: 24px;
  font-weight: 400;
  margin-bottom: 30px;
}

textarea {
  width: 100%;
  height: 120px;
  font-size: 24px;
  padding: 16px;
  box-sizing: border-box;
  border: 1px solid black;
  outline: none;
  resize: none;
}

#output {
  margin-top: 50px;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: flex-end;
}

.letter {
  height: 140px;
  width: auto;
  display: block;
}
</style>
</head>

<body>

<h1>SVG Typeface Tester</h1>

<textarea id="input" placeholder="A B C 입력해 보기"></textarea>

<div id="output"></div>

<script>
const input = document.getElementById("input");
const output = document.getElementById("output");

input.addEventListener("input", () => {
  output.innerHTML = "";

  const text = input.value.toUpperCase();

  for (const char of text) {
    if (char === " ") {
      const space = document.createElement("div");
      space.style.width = "60px";
      output.appendChild(space);
      continue;
    }

    if (char >= "A" && char <= "Z") {
      const img = document.createElement("img");
      img.src = `letters/${char}.svg`;
      img.className = "letter";
      img.alt = char;
      output.appendChild(img);
    }
  }
});
</script>

</body>
</html>
