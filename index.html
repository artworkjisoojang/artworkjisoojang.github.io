<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>지수장 서체</title>

<style>

@font-face {
    font-family: "Jisoo";
    src: url("./font.woff2") format("woff2");
}

body{
    margin:0;
    padding:60px;
    font-family:sans-serif;
}

textarea{
    width:100%;
    height:150px;
    font-size:24px;
}

#preview{
    margin-top:40px;
    font-family:"Jisoo";
    font-size:80px;
    line-height:1.2;
}

</style>

</head>
<body>

<h1>Typeface Tester</h1>

<textarea id="input" placeholder="여기에 입력하세요"></textarea>

<div id="preview">
안녕하세요
</div>

<script>

const input = document.getElementById("input");
const preview = document.getElementById("preview");

input.addEventListener("input",function(){
    preview.textContent = input.value || "안녕하세요";
});

</script>

</body>
</html>
