<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Jisoo Jang VL Prototype</title>

<style>
body {
  margin: 0;
  padding: 32px;
  background: white;
  color: black;
  font-family: Arial, sans-serif;
}

.intro-marquee {
  width: 100%;
  overflow: hidden;
  white-space: nowrap;
  margin-bottom: 48px;
}

.marquee-track {
  display: inline-block;
  font-size: 32px;
  line-height: 1.1;
  animation: moveText 24s linear infinite;
}

@keyframes moveText {
  from {
    transform: translateX(100%);
  }

  to {
    transform: translateX(-100%);
  }
}

h1 {
  font-size: 24px;
  font-weight: 400;
  margin: 0 0 30px 0;
}

textarea {
  width: 100%;
  height: 120px;
  padding: 0;
  border: none;
  background: transparent;
  outline: none;
  resize: none;
  font-size: 48px;
  font-family: inherit;
}

#output {
  margin-top: 50px;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: flex-end;
}

.letter {
  height: 140px;
  width: auto;
  display: block;
}
</style>
</head>

<body>

<div class="intro-marquee">
  <div class="marquee-track">
    Visual language is capable of disseminating knowledge more effectively than almost any other vehicle of communication. It can be learned and understood not only by educated people but also by those who are unable to read or write.
  </div>
</div>

<h1>Jisoo Jang VL Prototype</h1>

<textarea id="input" placeholder="A B C 입력해 보기"></textarea>

<div id="output"></div>

<script>
const input = document.getElementById("input");
const output = document.getElementById("output");

input.addEventListener("input", () => {
  output.innerHTML = "";

  const text = input.value.toUpperCase();

  for (const char of text) {
    if (char === " ") {
      const space = document.createElement("div");
      space.style.width = "60px";
      output.appendChild(space);
      continue;
    }

    if (char >= "A" && char <= "Z") {
      const img = document.createElement("img");
      img.src = `letters/${char}.svg`;
      img.className = "letter";
      img.alt = char;
      output.appendChild(img);
    }
  }
});
</script>

</body>
</html>
